services:
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark-delta
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_LOCAL_DIRS=/tmp
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - HADOOP_CONF_DIR=/opt/spark/conf
    entrypoint: ["./entrypoint.sh", "master"]
    networks:
      - spark-network
    depends_on:
      - metastore
    volumes:
      - ./spark-events:/tmp/spark-events
      - ./conf:/opt/spark/conf
      - warehouse:/opt/hive/warehouse

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark-delta
    entrypoint: ["./entrypoint.sh", "worker", "spark://spark-master:7077"]
    environment:
      - SPARK_LOCAL_DIRS=/tmp
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - HADOOP_CONF_DIR=/opt/spark/conf
    depends_on:
      - spark-master
      - metastore
    networks:
      - spark-network
    volumes:
      - ./spark-events:/tmp/spark-events
      - ./conf:/opt/spark/conf
      - warehouse:/opt/hive/warehouse

  spark-history-server:
    build:
      context: .
      dockerfile: Dockerfile.spark-delta
    environment:
      - SPARK_LOCAL_DIRS=/tmp
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - HADOOP_CONF_DIR=/opt/spark/conf
    entrypoint: ["./entrypoint.sh", "history-server"]
    ports:
      - "18080:18080"
    depends_on:
      - spark-master
      - metastore
    networks:
      - spark-network
    volumes:
      - ./spark-events:/tmp/spark-events
      - ./conf:/opt/spark/conf
      - warehouse:/opt/hive/warehouse

  hiveserver2:
    image: apache/hive:4.0.0
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      - SERVICE_NAME=hiveserver2
      - SERVICE_OPTS=-Dhive.metastore.uris=thrift://metastore:9083
      - IS_RESUME=true
    depends_on:
      - metastore
    networks:
      - spark-network
    volumes:
      - warehouse:/opt/hive/warehouse

  metastore:
    image: apache/hive:4.0.0
    ports:
      - "9083:9083"
    environment:
      - SERVICE_NAME=metastore
      - DB_DRIVER=postgres
      - SERVICE_OPTS=-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore_db -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=password
    depends_on:
      - postgres
    networks:
      - spark-network
    volumes:
      - warehouse:/opt/hive/warehouse
      - ./jars/postgresql-42.7.8.jar:/opt/hive/lib/postgres.jar
  
  postgres:
    image: postgres:latest
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=metastore_db
    networks:
      - spark-network
    volumes:
      - postgres-data:/var/lib/postgresql
  
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SERVICES=s3
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - PERSISTENCE=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - localstack-data:/var/lib/localstack
    networks:
      - spark-network

networks:
  spark-network:
    driver: bridge
  
volumes:
  postgres-data:
  warehouse:
  localstack-data: